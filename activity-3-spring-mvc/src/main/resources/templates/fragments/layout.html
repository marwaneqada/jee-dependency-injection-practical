<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' · Stockroom'">Stockroom</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="site-header" th:fragment="navigation">
    <nav class="navigation" aria-label="Main navigation">
        <a class="brand" th:href="@{/products}">
            <span class="brand-mark">S</span>
            <span>Stockroom</span>
        </a>
        <div class="nav-actions">
            <a th:href="@{/products}">Products</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}">Add product</a>
            <span class="identity" sec:authentication="name">username</span>
            <form th:action="@{/logout}" method="post">
                <button class="link-button" type="submit">Sign out</button>
            </form>
        </div>
    </nav>
</header>

<footer class="site-footer" th:fragment="footer">
    <p>Activity 3 · Spring MVC, Thymeleaf, JPA, and Security</p>
</footer>
</body>
</html>
